name: deploy-api-dev

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/deploy-api-dev.yml'
      - 'infra/terraform/**'
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/deploy-api-dev.yml'
      - 'infra/terraform/**'
  workflow_dispatch:

concurrency:
  group: deploy-api-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_WORKING_DIRECTORY: infra/terraform/envs/dev
  TF_STATE_PREFIX: tfstate/healthfit/dev
  CLOUD_RUN_REGION: europe-west1
  CLOUD_RUN_SERVICE: healthfit-dev
  ARTIFACT_REGISTRY_REPOSITORY: healthfit-dev
  IMAGE_NAME: healthfit

jobs:
  prepare-trigger:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.prepare.outputs.ref }}
      sha: ${{ steps.prepare.outputs.sha }}
      should_apply: ${{ steps.prepare.outputs.should_apply }}
      image_uri: ${{ steps.prepare.outputs.image_uri }}
    steps:
      - id: prepare
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REF="${{ github.event.pull_request.head.sha }}"
            SHOULD_APPLY="false"
          else
            REF="${{ github.sha }}"
            SHOULD_APPLY="true"
          fi

          SHORT_SHA="${REF:0:12}"
          IMAGE_URI="${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"

          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "sha=${REF}" >> "$GITHUB_OUTPUT"
          echo "should_apply=${SHOULD_APPLY}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      deploy_matrix: ${{ steps.matrix.outputs.deploy_matrix }}
    steps:
      - id: matrix
        shell: bash
        run: |
          echo 'deploy_matrix={"include":[{"target":"cloudrun","environment":"dev"}]}' >> "$GITHUB_OUTPUT"

  run-backend-tests:
    needs: prepare-trigger
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-trigger.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm ci --ignore-scripts

      - name: Run backend tests
        run: npm test

  build-backend:
    needs: prepare-trigger
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-trigger.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build backend
        run: npm run build:server

  deploy-dev-terraform-plan:
    needs: [prepare-trigger, matrix-setup, run-backend-tests, build-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.deploy_matrix) }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-trigger.outputs.ref }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_DEV }}" \
            -backend-config="prefix=${{ env.TF_STATE_PREFIX }}"

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.CLOUD_RUN_REGION }}" \
            -var="service_name=${{ env.CLOUD_RUN_SERVICE }}" \
            -var="artifact_registry_repository_id=${{ env.ARTIFACT_REGISTRY_REPOSITORY }}" \
            -var="frontend_bucket_name=${{ secrets.TF_STATE_BUCKET_DEV }}" \
            -var="domain_name=${{ secrets.APP_DOMAIN_DEV }}" \
            -var="frontend_origin=https://${{ secrets.APP_DOMAIN_DEV }}" \
            -var="image=${{ needs.prepare-trigger.outputs.image_uri }}"

      - name: Summarize terraform plan
        shell: bash
        run: |
          {
            echo "### Terraform deployment plan"
            echo ""
            echo "- Environment: dev"
            echo "- Service: ${{ env.CLOUD_RUN_SERVICE }}"
            echo "- Region: ${{ env.CLOUD_RUN_REGION }}"
            echo "- Image: ${{ needs.prepare-trigger.outputs.image_uri }}"
            echo "- Apply enabled: ${{ needs.prepare-trigger.outputs.should_apply }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-dev-terraform-apply:
    needs: [prepare-trigger, matrix-setup, deploy-dev-terraform-plan]
    if: needs.prepare-trigger.outputs.should_apply == 'true'
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.deploy_matrix) }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-trigger.outputs.ref }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_DEV }}" \
            -backend-config="prefix=${{ env.TF_STATE_PREFIX }}"

      - name: Bootstrap Artifact Registry
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            -target=module.app.google_project_service.required \
            -target=module.app.google_artifact_registry_repository.app \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.CLOUD_RUN_REGION }}" \
            -var="service_name=${{ env.CLOUD_RUN_SERVICE }}" \
            -var="artifact_registry_repository_id=${{ env.ARTIFACT_REGISTRY_REPOSITORY }}" \
            -var="frontend_bucket_name=${{ secrets.TF_STATE_BUCKET_DEV }}" \
            -var="domain_name=${{ secrets.APP_DOMAIN_DEV }}" \
            -var="frontend_origin=https://${{ secrets.APP_DOMAIN_DEV }}" \
            -var="image=${{ needs.prepare-trigger.outputs.image_uri }}"

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev --quiet

      - name: Build container image
        run: docker build -t "${{ needs.prepare-trigger.outputs.image_uri }}" .

      - name: Push container image
        run: docker push "${{ needs.prepare-trigger.outputs.image_uri }}"

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.CLOUD_RUN_REGION }}" \
            -var="service_name=${{ env.CLOUD_RUN_SERVICE }}" \
            -var="artifact_registry_repository_id=${{ env.ARTIFACT_REGISTRY_REPOSITORY }}" \
            -var="frontend_bucket_name=${{ secrets.TF_STATE_BUCKET_DEV }}" \
            -var="domain_name=${{ secrets.APP_DOMAIN_DEV }}" \
            -var="frontend_origin=https://${{ secrets.APP_DOMAIN_DEV }}" \
            -var="image=${{ needs.prepare-trigger.outputs.image_uri }}"

      - name: Smoke test live API route
        run: |
          curl --fail --silent --show-error \
            --retry 10 \
            --retry-all-errors \
            --retry-delay 6 \
            "https://${{ secrets.APP_DOMAIN_DEV }}/api/waitlist-count"
