name: ci-backend

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/ci-backend.yml'
      - '.github/workflows/deploy-api-dev.yml'
      - 'infra/terraform/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/ci-backend.yml'
      - '.github/workflows/deploy-api-dev.yml'
      - 'infra/terraform/**'

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint backend
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build backend
        run: npm run build:server
