name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-trigger:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.prepare.outputs.ref }}
      sha: ${{ steps.prepare.outputs.sha }}
    steps:
      - id: prepare
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - id: matrix
        shell: bash
        run: |
          echo 'build_matrix={
            "include": [
              {
                "name": "backend",
                "working_directory": ".",
                "install": "npm ci --ignore-scripts",
                "lint": "npm run lint",
                "build": "npx tsc --noEmit"
              },
              {
                "name": "frontend",
                "working_directory": "client",
                "install": "npm ci --ignore-scripts",
                "lint": "npm run lint",
                "build": "npm run build"
              }
            ]
          }' >> "$GITHUB_OUTPUT"

  run-backend-tests:
    needs: prepare-trigger
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-trigger.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm ci --ignore-scripts

      - name: Run backend tests
        run: npm test

  matrix-build:
    needs: [prepare-trigger, matrix-setup]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.build_matrix) }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-trigger.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.working_directory }}
        run: ${{ matrix.install }}

      - name: Lint ${{ matrix.name }}
        working-directory: ${{ matrix.working_directory }}
        run: ${{ matrix.lint }}

      - name: Build ${{ matrix.name }}
        working-directory: ${{ matrix.working_directory }}
        run: ${{ matrix.build }}
